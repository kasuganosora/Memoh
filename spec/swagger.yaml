info:
  contact: {}
paths:
  /auth/login:
    post:
      description: Validate user credentials and issue a JWT
      parameters:
      - description: Login request
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/internal_handlers.LoginRequest'
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handlers.LoginResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
      summary: Login
      tags:
      - auth
  /auth/refresh:
    post:
      description: Issue a new JWT using the existing claims with updated expiration
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handlers.RefreshResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Refresh Token
      tags:
      - auth
  /bots:
    get:
      description: List bots accessible to current user (admin can specify owner_id)
      parameters:
      - description: Owner user ID (admin only)
        in: query
        name: owner_id
        type: string
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_memohai_memoh_internal_bots.ListBotsResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
      summary: List bots
      tags:
      - bots
    post:
      description: Create a bot user owned by current user (or admin-specified owner)
      parameters:
      - description: Bot payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/github_com_memohai_memoh_internal_bots.CreateBotRequest'
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/github_com_memohai_memoh_internal_bots.Bot'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
      summary: Create bot user
      tags:
      - bots
  /bots/{bot_id}/acl/channel-identities:
    get:
      description: Search locally observed channel identities for building ACL rules
      parameters:
      - description: Bot ID
        in: path
        name: bot_id
        required: true
        type: string
      - description: Search query
        in: query
        name: q
        type: string
      - description: Max results
        in: query
        name: limit
        type: integer
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_memohai_memoh_internal_acl.ChannelIdentityCandidateListResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
      summary: Search ACL channel identity candidates
      tags:
      - bots
  /bots/{bot_id}/acl/channel-identities/{channel_identity_id}/conversations:
    get:
      description: List previously observed conversation candidates for a channel
        identity, for scoped rule building
      parameters:
      - description: Bot ID
        in: path
        name: bot_id
        required: true
        type: string
      - description: Channel Identity ID
        in: path
        name: channel_identity_id
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_memohai_memoh_internal_acl.ObservedConversationCandidateListResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
      summary: List observed conversations for a channel identity
      tags:
      - bots
  /bots/{bot_id}/acl/channel-types/{channel_type}/conversations:
    get:
      description: List previously observed group/thread conversation candidates for
        a channel type under this bot
      parameters:
      - description: Bot ID
        in: path
        name: bot_id
        required: true
        type: string
      - description: Channel type (e.g. telegram, discord)
        in: path
        name: channel_type
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_memohai_memoh_internal_acl.ObservedConversationCandidateListResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "403":
          description: Forbidden
